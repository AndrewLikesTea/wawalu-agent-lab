name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: python3 -m unittest discover -s runner/tests -v
      - name: Require synthetic reviewer approval of current head
        if: github.event_name == 'pull_request'
        run: python3 scripts/check_reviewer_approval.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      - name: Enforce agent change policy
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'agent/')
        run: python3 runner/policy.py --base "origin/${{ github.base_ref }}"
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: preview-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
