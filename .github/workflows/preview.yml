name: Preview
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
permissions:
  contents: read
  actions: read
  pull-requests: write
concurrency:
  group: preview-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true
jobs:
  deploy-preview:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'agent/') &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: preview-dist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Deploy validated static artifact
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name wawalu-agent-lab --branch "pr-${{ github.event.workflow_run.pull_requests[0].number }}"
        env:
          WAWALU_PREVIEW_SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
