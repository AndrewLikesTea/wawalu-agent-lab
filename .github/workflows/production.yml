name: Production
on:
  workflow_dispatch:
    inputs:
      commit:
        description: Exact main commit to deploy
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: production
  cancel-in-progress: false
jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && inputs.commit == github.sha
    environment:
      name: production
      url: https://labs.wawalu.org
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Deploy tested commit
        run: npx wrangler pages deploy dist --project-name wawalu-agent-lab --branch main --commit-hash "${{ inputs.commit }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Production smoke test
        run: curl --fail --retry 5 --retry-delay 3 https://labs.wawalu.org/healthz

